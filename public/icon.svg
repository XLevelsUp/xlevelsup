<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Dark background -->
  <rect width="512" height="512" fill="#0A0A0F" rx="64"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="crossGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F0FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B026FF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cross/X shape - two diagonal lines -->
  <!-- Top-left to bottom-right -->
  <line x1="140" y1="140" x2="372" y2="372" 
        stroke="url(#crossGradient)" 
        stroke-width="48" 
        stroke-linecap="round"/>
  
  <!-- Top-right to bottom-left -->
  <line x1="372" y1="140" x2="140" y2="372" 
        stroke="url(#crossGradient)" 
        stroke-width="48" 
        stroke-linecap="round"/>
</svg>
